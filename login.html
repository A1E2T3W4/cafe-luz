<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/49164.jpg" type="image/x-icon">
</head>

<body class="by">
    <form class="login-form">
        <h2>Login</h2>
        <div class="input-bx">
            <input type="text" placeholder="Usuário" required>
        </div>
        <div class="input-bx">
            <input type="password" placeholder="Senha" required>
        </div>
        <div class="remember">
            <label for="">
                <input type="checkbox">
                Lembrar Senha
            </label>
            <a href="#"> Esqueci a Senha</a>
        </div>

        <button type="submit" class="btnn">Login</button>
        <div class="rester-link">
            <p>Não tem uma conta <a href="">Cadastre-se</a></p>
        </div>
    </form>
</body>

</html>
